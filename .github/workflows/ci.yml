name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: flaskdb
          POSTGRES_USER: flaskuser
          POSTGRES_PASSWORD: flaskpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U flaskuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: flaskuser
      DB_PASSWORD: flaskpass
      DB_NAME: flaskdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Create table
        run: |
          PGPASSWORD=flaskpass psql -h 127.0.0.1 -U flaskuser -d flaskdb -c "
          CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255),
            email VARCHAR(255)
          );"

      - name: Run tests
        run: pytest -v