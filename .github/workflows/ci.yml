name: CI Pipeline

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DB_HOST: 127.0.0.1
      DB_USER: flaskuser
      DB_PASSWORD: flaskpass
      DB_NAME: flaskdb
      DB_PORT: 3306

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flaskdb
          MYSQL_USER: flaskuser
          MYSQL_PASSWORD: flaskpass
        options: >-
          --health-cmd="mysqladmin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 pytest-mock

      - name: Create test database schema
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
          USE flaskdb;
          CREATE TABLE IF NOT EXISTS users (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(255),
            email VARCHAR(255)
          );"

      - name: Run Tests
        run: pytest -v --disable-warnings

      - name: Build Docker Image
        run: docker build -t flask-app:ci .