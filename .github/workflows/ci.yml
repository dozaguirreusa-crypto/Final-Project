name: CI Pipeline

on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    # ✅ Habilitar Node.js 24 para que NO salgan warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flaskdb
          MYSQL_USER: flaskuser
          MYSQL_PASSWORD: flaskpass
        options: >-
          --health-cmd="mysqladmin ping -h localhost --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: flaskuser
      MYSQL_PASSWORD: flaskpass
      MYSQL_DB: flaskdb

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4.2.0  # ✅ compatible con Node 24

      - name: ✅ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ✅ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: ⏳ Wait for MySQL
        run: |
          for i in {1..20}; do
            if mysqladmin ping -h "$MYSQL_HOST" --silent; then
              echo "✅ MySQL está listo"
              break
            fi
            echo "⌛ Esperando MySQL..."
            sleep 3
          done

      - name: 🔍 Linting (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: 🧪 Run Tests
        run: pytest -v --disable-warnings

      - name: 🐳 Build Docker Image
        run: docker build -t flask-app:ci .